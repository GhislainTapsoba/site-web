services:
  web-frontend:
    build: .
    container_name: deep-technologies-web
    environment:
      NODE_ENV: production
    ports:
      - "3010:80" # <- ici changement
    networks:
      app-network:
        ipv4_address: 172.28.0.5
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
